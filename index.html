<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Guess - Full Roster</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f1923;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Pantalla de Inicio --- */
        #main-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
            width: 100%;
        }

        .menu-title { font-size: 3rem; color: #ff4655; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 40px; }

        .mode-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
        }

        .mode-card {
            background: #1f2731;
            border: 2px solid #333;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .mode-card:hover { border-color: #ff4655; transform: translateY(-5px); }
        .mode-card h2 { color: #ff4655; margin: 10px 0; font-size: 1.2rem; text-transform: uppercase; }
        .mode-card p { font-size: 0.9rem; color: #ccc; margin-bottom: 15px; line-height: 1.4; }

        /* --- Interfaz General --- */
        #game-interface, #minigame-interface {
            display: none;
            width: 100%;
            max-width: 900px;
        }

        .header-game { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        .card-panel {
            background: #1f2731;
            border: 2px solid #333;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
            min-width: 280px;
        }

        .ask-panel-container {
            border: 1px solid #ff4655;
            border-radius: 10px;
            padding: 20px;
            background: #101822;
            width: 100%;
        }

        .secret-agent-container {
            width: 120px; height: 120px;
            background: #ece8e1;
            margin: 15px auto;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 4px solid #ff4655;
        }
        .secret-agent-img { width: 100%; display: none; }
        .q-mark { font-size: 60px; color: #0f1923; font-weight: bold; }

        #game-message, #mini-msg {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            display: none;
        }
        .msg-win { background: #4caf50; color: white; display: block !important; }
        .msg-lose { background: #ff4655; color: white; display: block !important; }
        .msg-info { background: #0f1923; border: 1px solid #ff4655; color: white; display: block !important; }

        .stats-grid-img {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }
        .stat-box-img { text-align: center; border-right: 1px solid #333; }
        .stat-box-img:last-child { border-right: none; }
        .stat-label-img { font-size: 0.7rem; text-transform: uppercase; color: #888; }
        .stat-val-img { font-size: 1.5rem; color: #ff4655; font-weight: bold; }

        .board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 20px;
            width: 100%;
        }

        .agent-card {
            background: #ece8e1;
            padding: 8px;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            color: #0f1923;
            font-size: 0.8rem;
        }
        .discarded { opacity: 0.15; filter: grayscale(100%); }

        #history-list { 
            margin-top: 15px; 
            width: 100%; 
            max-height: 150px; 
            overflow-y: auto; 
            border-top: 1px solid #1f2731;
        }
        .history-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            background: #0b1219;
            border-bottom: 1px solid #1f2731;
            font-size: 0.85rem;
        }
        .res-si { color: #4caf50; font-weight: bold; }
        .res-no { color: #ff4655; font-weight: bold; }

        .mini-card {
            background: #1f2731;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #ff4655;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .clue-box { background: #0f1923; padding: 20px; border-radius: 8px; margin: 15px 0; font-size: 1.2rem; width: 100%; }
        .mini-img { max-width: 100%; height: auto; max-height: 300px; border-radius: 8px; margin-bottom: 15px; border: 2px solid #333; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 15px; }
        
        .btn {
            background: transparent; border: 1px solid #ff4655; color: #ff4655;
            padding: 10px 20px; border-radius: 5px; cursor: pointer;
            font-weight: bold; text-transform: uppercase;
        }
        .btn:hover { background: #ff4655; color: white; }
        .btn-wide { width: 100%; padding: 12px; }

        input[type="text"] {
            width: 100%; padding: 12px; background: #0f1923; border: 1px solid #ff4655;
            color: white; border-radius: 5px; margin-bottom: 10px; text-align: center;
        }

        .footer-bar {
            margin-top: 50px;
            padding: 20px;
            border-top: 1px solid #333;
            width: 100%;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }
        .footer-bar a { color: #ff4655; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 class="menu-title">VALORANT MINIGAMES</h1>
        <div class="mode-container" id="menu-grid"></div>
    </div>

    <div id="game-interface">
        <div class="header-game">
            <button class="btn" onclick="backToMenu()">← Menú</button>
            <h2 id="display-mode">MODO</h2>
            <div style="width:80px"></div>
        </div>

        <div style="display:flex; gap:20px; flex-wrap:wrap; align-items: flex-start;">
            <div class="card-panel" style="max-width: 300px;">
                <h3 id="panel-title" style="margin-bottom: 15px;">Agente Secreto</h3>
                <div class="secret-agent-container">
                    <span id="q-mark" class="q-mark">?</span>
                    <img id="secret-img" class="secret-agent-img" src="">
                </div>
                <h3 id="secret-name" style="margin-bottom: 15px;">???</h3>

                <div id="classic-pick-zone" style="display:none;">
                    <button class="btn btn-wide" onclick="startPicking()">Elegir mi Agente</button>
                </div>

                <div id="reset-zone" style="display:none;">
                    <button class="btn btn-wide" style="background:#ff4655; color:white;" onclick="resetGame()">REINICIAR TABLERO</button>
                </div>
            </div>

            <div id="ask-interface-container" class="ask-panel-container" style="flex: 2; display: none;">
                <div class="stats-grid-img">
                    <div class="stat-box-img">
                        <div class="stat-label-img">Preguntas</div>
                        <div class="stat-val-img"><span id="stat-q">0</span> / 10</div>
                    </div>
                    <div class="stat-box-img">
                        <div class="stat-label-img">Fallos</div>
                        <div class="stat-val-img"><span id="stat-f">0</span> / 3</div>
                    </div>
                </div>

                <div id="game-message"></div>

                <div id="ask-controls">
                    <div style="display:flex; gap:10px; margin-bottom:15px;">
                        <select id="cat-sel" onchange="updateValOptions()" style="flex:1; padding:12px; background:#0f1923; color:white; border:1px solid #333; border-radius: 5px;">
                            <option value="role">¿Su Rol es...?</option>
                            <option value="country">¿Es de...?</option>
                            <option value="gender">¿Es Género...?</option>
                        </select>
                        <select id="val-sel" style="flex:1; padding:12px; background:#0f1923; color:white; border:1px solid #333; border-radius: 5px;"></select>
                    </div>
                    <button class="btn btn-wide" onclick="askQuestion()">PREGUNTAR ATRIBUTO</button>
                </div>

                <div id="history-list"></div>
            </div>
        </div>

        <div class="board" id="board"></div>
    </div>

    <div id="minigame-interface">
        <div class="header-game">
            <button class="btn" onclick="backToMenu()">← Menú</button>
            <h2 id="mini-title-display">MINIJUEGO</h2>
            <div style="width:80px"></div>
        </div>
        <div class="mini-card">
            <div id="mini-msg"></div>
            <img id="mini-img" class="mini-img" style="display:none;">
            <div id="mini-clue" class="clue-box"></div>
            
            <div id="mini-input-zone" style="display:none; width: 100%;">
                <input type="text" id="mini-input" placeholder="Nombre del agente/skin...">
                <button class="btn" style="width:100%" onclick="checkMiniAnswer()">Responder</button>
            </div>
            
            <div id="mini-options" class="options-grid" style="display:none;"></div>
            
            <button id="btn-next" class="btn" style="width:100%; margin-top:20px; display:none; background:#ff4655; color:white;" onclick="loadMiniRound()">Siguiente →</button>
        </div>
    </div>

    <footer class="footer-bar">
        MADE BY FNP191
    </footer>

    <script>
        let agents = [], maps = [], skins = [];
        let myAgent = null, mode = '', gameOver = false, isPicking = false;
        let qCount = 0, fCount = 0;
        let miniAns = '', miniMode = '';

        const agentExtra = {
            "Jett": { c: "Corea del Sur", g: "Femenino" }, "Raze": { c: "Brasil", g: "Femenino" },
            "Breach": { c: "Suecia", g: "Masculino" }, "Omen": { c: "Desconocido", g: "No Humano" },
            "Brimstone": { c: "Estados Unidos", g: "Masculino" }, "Phoenix": { c: "Reino Unido", g: "Masculino" },
            "Sage": { c: "China", g: "Femenino" }, "Sova": { c: "Rusia", g: "Masculino" },
            "Viper": { c: "Estados Unidos", g: "Femenino" }, "Cypher": { c: "Marruecos", g: "Masculino" },
            "Reyna": { c: "México", g: "Femenino" }, "Killjoy": { c: "Alemania", g: "Femenino" },
            "Skye": { c: "Australia", g: "Femenino" }, "Yoru": { c: "Japón", g: "Masculino" },
            "Astra": { c: "Ghana", g: "Femenino" }, "KAY/O": { c: "Desconocido", g: "No Humano" },
            "Chamber": { c: "Francia", g: "Masculino" }, "Neon": { c: "Filipinas", g: "Femenino" },
            "Fade": { c: "Turquía", g: "Femenino" }, "Harbor": { c: "India", g: "Masculino" },
            "Gekko": { c: "Estados Unidos", g: "Masculino" }, "Deadlock": { c: "Noruega", g: "Femenino" },
            "Iso": { c: "China", g: "Masculino" }, "Clove": { c: "Escocia", g: "Femenino" },
            "Vyse": { c: "Desconocido", g: "Femenino" }
        };

        async function init() {
            try {
                const [rA, rM, rS] = await Promise.all([
                    fetch('https://valorant-api.com/v1/agents?isPlayableCharacter=true&language=es-ES'),
                    fetch('https://valorant-api.com/v1/maps?language=es-ES'),
                    fetch('https://valorant-api.com/v1/weapons/skins?language=es-ES')
                ]);
                agents = (await rA.json()).data;
                maps = (await rM.json()).data.filter(m => m.displayIcon && m.displayName !== "District" && m.displayName !== "Kasbah" && m.displayName !== "Piazza" && m.displayName !== "Drift" && m.displayName !== "Glitch");
                skins = (await rS.json()).data.filter(s => s.displayIcon && !s.displayName.includes("Standard"));
                
                document.getElementById('menu-grid').innerHTML = `
                    <div class="mode-card" onclick="startGame('classic')">
                        <h2>Modo Clásico</h2>
                        <p>Elige tu propio agente secreto. Ahora puedes marcar y desmarcar agentes del tablero.</p>
                        <button class="btn">JUGAR</button>
                    </div>
                    <div class="mode-card" onclick="startGame('ask')">
                        <h2>Adivina el Agente</h2>
                        <p>Adivina el agente secreto de la IA mediante preguntas de atributos.</p>
                        <button class="btn">JUGAR</button>
                    </div>
                    <div class="mode-card" onclick="startMini('agente')">
                        <h2>¿Quién es?</h2>
                        <p>Lee la descripción oficial y adivina de qué agente se trata.</p>
                        <button class="btn">JUGAR</button>
                    </div>
                    <div class="mode-card" onclick="startMini('habilidad')">
                        <h2>Habilidades</h2>
                        <p>¿Conoces todos los nombres de las habilidades? Ponlo a prueba.</p>
                        <button class="btn">JUGAR</button>
                    </div>
                    <div class="mode-card" onclick="startMini('arma')">
                        <h2>Armas</h2>
                        <p>Adivina el arma basándote en su precio y capacidad de balas.</p>
                        <button class="btn">JUGAR</button>
                    </div>
                    <div class="mode-card" onclick="startMini('mapa')">
                        <h2>Mapas</h2>
                        <p>Identifica el mapa de Valorant solo por su icono de radar.</p>
                        <button class="btn">JUGAR</button>
                    </div>
                    <div class="mode-card" onclick="startMini('skin')">
                        <h2>Skins</h2>
                        <p>¿Eres un experto en la tienda? Adivina el nombre de la skin.</p>
                        <button class="btn">JUGAR</button>
                    </div>
                    <div class="mode-card" onclick="startMini('trivia')">
                        <h2>Trivia</h2>
                        <p>Preguntas sobre lore, nombres reales y mecánicas del juego.</p>
                        <button class="btn">JUGAR</button>
                    </div>
                `;
            } catch (e) { console.error(e); }
        }

        function startGame(m) {
            mode = m;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-interface').style.display = 'block';
            document.getElementById('display-mode').textContent = m === 'classic' ? 'MODO CLÁSICO' : 'ADIVINA EL AGENTE';
            document.getElementById('panel-title').textContent = "Agente Secreto";
            resetGame();
        }

        function resetGame() {
            gameOver = false; isPicking = false; qCount = 0; fCount = 0;
            myAgent = (mode === 'ask') ? agents[Math.floor(Math.random() * agents.length)] : null;
            
            document.getElementById('stat-q').textContent = "0";
            document.getElementById('stat-f').textContent = "0";
            
            // Corrección: Asegurar que el contenedor principal esté visible en modo 'ask'
            const askContainer = document.getElementById('ask-interface-container');
            askContainer.style.display = (mode === 'ask') ? 'block' : 'none';
            
            // Corrección: Asegurar que los controles de pregunta vuelvan a aparecer
            document.getElementById('ask-controls').style.display = 'block';
            
            document.getElementById('classic-pick-zone').style.display = (mode === 'classic') ? 'block' : 'none';
            document.getElementById('game-message').style.display = 'none';
            document.getElementById('game-message').className = '';
            document.getElementById('reset-zone').style.display = (mode === 'classic' || mode === 'ask') ? 'block' : 'none';
            document.getElementById('q-mark').style.display = 'block';
            document.getElementById('secret-img').style.display = 'none';
            document.getElementById('secret-name').textContent = "???";
            document.getElementById('history-list').innerHTML = '';
            
            updateValOptions();
            renderBoard();
        }

        function renderBoard() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            agents.forEach(a => {
                const card = document.createElement('div');
                card.className = 'agent-card';
                card.innerHTML = `<img src="${a.displayIcon}" width="100%"><br>${a.displayName}`;
                card.onclick = () => {
                    if (isPicking) {
                        myAgent = a; isPicking = false;
                        document.getElementById('secret-img').src = a.displayIcon;
                        document.getElementById('secret-img').style.display = 'block';
                        document.getElementById('q-mark').style.display = 'none';
                        document.getElementById('secret-name').textContent = a.displayName;
                        const msg = document.getElementById('game-message');
                        msg.textContent = "Agente seleccionado";
                        msg.className = 'msg-info';
                        msg.style.display = 'block';
                    } else if (!gameOver) {
                        if (mode === 'classic') card.classList.toggle('discarded');
                        else handleGuess(a, card);
                    }
                };
                b.appendChild(card);
            });
        }

        function handleGuess(a, card) {
            if (a.displayName === myAgent.displayName) { showEnd(true); } 
            else {
                card.classList.add('discarded');
                fCount++;
                document.getElementById('stat-f').textContent = fCount;
                if (fCount >= 3) showEnd(false);
            }
        }

        function askQuestion() {
            if (qCount >= 10 || gameOver) return;
            qCount++;
            document.getElementById('stat-q').textContent = qCount;
            const cat = document.getElementById('cat-sel').value;
            const val = document.getElementById('val-sel').value;
            let result = false;

            if (cat === 'role') result = myAgent.role.displayName === val;
            else if (cat === 'country') result = agentExtra[myAgent.displayName]?.c === val;
            else if (cat === 'gender') result = agentExtra[myAgent.displayName]?.g === val;

            const history = document.getElementById('history-list');
            const row = document.createElement('div');
            row.className = 'history-row';
            const label = document.getElementById('cat-sel').options[document.getElementById('cat-sel').selectedIndex].text.replace('...', '');
            row.innerHTML = `<span>${label} ${val}</span><span class="${result ? 'res-si' : 'res-no'}">${result ? 'SÍ' : 'NO'}</span>`;
            history.prepend(row);

            if (qCount >= 10 && !gameOver) {
                const msg = document.getElementById('game-message');
                msg.textContent = "Sin preguntas. ¡Arriesga!";
                msg.className = 'msg-info';
                msg.style.display = 'block';
            }
        }

        function showEnd(win) {
            gameOver = true;
            const msg = document.getElementById('game-message');
            msg.textContent = win ? "¡GANASTE!" : `PERDISTE. Era ${myAgent.displayName}`;
            msg.className = win ? 'msg-win' : 'msg-lose';
            msg.style.display = 'block';
            document.getElementById('secret-img').src = myAgent.displayIcon;
            document.getElementById('secret-img').style.display = 'block';
            document.getElementById('q-mark').style.display = 'none';
            document.getElementById('secret-name').textContent = myAgent.displayName;
            document.getElementById('reset-zone').style.display = 'block';
            if(mode === 'ask') document.getElementById('ask-controls').style.display = 'none';
        }

        function startPicking() { 
            isPicking = true;
            const msg = document.getElementById('game-message');
            msg.textContent = "Haz clic en un agente del tablero...";
            msg.className = 'msg-info';
            msg.style.display = 'block';
        }

        function updateValOptions() {
            const cat = document.getElementById('cat-sel').value;
            const sel = document.getElementById('val-sel');
            sel.innerHTML = '';
            let list = [];
            if (cat === 'role') list = [...new Set(agents.map(a => a.role.displayName))];
            else if (cat === 'country') list = [...new Set(Object.values(agentExtra).map(e => e.c))].sort();
            else if (cat === 'gender') list = ["Masculino", "Femenino", "No Binario", "No Humano"];
            list.forEach(item => { const o = document.createElement('option'); o.value = item; o.textContent = item; sel.appendChild(o); });
        }

        // --- LÓGICA MINIJUEGOS ---
        function startMini(m) {
            miniMode = m;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('minigame-interface').style.display = 'block';
            document.getElementById('mini-title-display').textContent = m.toUpperCase();
            loadMiniRound();
        }

        function loadMiniRound() {
            document.getElementById('mini-msg').style.display = 'none';
            document.getElementById('mini-msg').className = '';
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('mini-input').value = '';
            document.getElementById('mini-input-zone').style.display = 'none';
            document.getElementById('mini-options').style.display = 'none';
            document.getElementById('mini-img').style.display = 'none';
            document.getElementById('mini-img').src = '';
            
            if (miniMode === 'agente') {
                const a = agents[Math.floor(Math.random() * agents.length)];
                miniAns = a.displayName.toLowerCase();
                let desc = a.description.replace(new RegExp(a.displayName, 'gi'), "Este agente");
                document.getElementById('mini-clue').innerHTML = `<b>ROL:</b> ${a.role.displayName}<br><br><i>"${desc}"</i>`;
                document.getElementById('mini-input-zone').style.display = 'block';
            } 
            else if (miniMode === 'habilidad') {
                const a = agents[Math.floor(Math.random() * agents.length)];
                const ab = a.abilities[Math.floor(Math.random() * a.abilities.length)];
                miniAns = a.displayName.toLowerCase();
                document.getElementById('mini-clue').innerHTML = `Habilidad: <b>${ab.displayName}</b><br>¿De qué agente es?`;
                document.getElementById('mini-input-zone').style.display = 'block';
            }
            else if (miniMode === 'mapa') {
                const m = maps[Math.floor(Math.random() * maps.length)];
                miniAns = m.displayName.toLowerCase();
                document.getElementById('mini-img').src = m.displayIcon;
                document.getElementById('mini-img').style.display = 'block';
                document.getElementById('mini-clue').textContent = "¿Qué mapa es?";
                renderMiniOptions(maps.map(x => x.displayName), m.displayName);
            }
            else if (miniMode === 'arma') {
                const w = [{n: "Vandal", p: "2900", c: "25"},{n: "Phantom", p: "2900", c: "30"},{n: "Operator", p: "4700", c: "5"},{n: "Guardian", p: "2250", c: "12"},{n: "Bulldog", p: "2100", c: "24"},{n: "Classic", p: "0", c: "12"},{n: "Ghost", p: "500", c: "15"},{n: "Sheriff", p: "800", c: "6"},{n: "Stinger", p: "950", c: "20"},{n: "Shorty", p: "900", c: "2"}];
                const pick = w[Math.floor(Math.random() * w.length)];
                miniAns = pick.n.toLowerCase();
                document.getElementById('mini-clue').innerHTML = `Precio: <b>${pick.p}</b><br>Cargador: <b>${pick.c} balas</b>`;
                renderMiniOptions(w.map(x => x.n), pick.n);
            }
            else if (miniMode === 'skin') {
                const s = skins[Math.floor(Math.random() * skins.length)];
                miniAns = s.displayName.toLowerCase();
                document.getElementById('mini-img').src = s.displayIcon;
                document.getElementById('mini-img').style.display = 'block';
                document.getElementById('mini-clue').textContent = "¿Nombre de la Skin?";
                document.getElementById('mini-input-zone').style.display = 'block';
            }
            else if (miniMode === 'trivia') {

        function renderMiniOptions(pool, correct) {
            const grid = document.getElementById('mini-options');
            grid.innerHTML = ''; grid.style.display = 'grid';
            let options = [...new Set(pool)].sort(() => 0.5 - Math.random()).slice(0, 4);
            if (!options.includes(correct)) options[0] = correct;
            options.sort().forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn'; btn.textContent = opt;
                btn.onclick = () => showMiniResult(opt.toLowerCase() === correct.toLowerCase(), correct);
                grid.appendChild(btn);
            });
        }

        function checkMiniAnswer() {
            const user = document.getElementById('mini-input').value.trim().toLowerCase();
            showMiniResult(user === miniAns, miniAns);
        }

        function showMiniResult(win, correct) {
            const msg = document.getElementById('mini-msg');
            msg.textContent = win ? "¡CORRECTO!" : `INCORRECTO. Era: ${correct.toUpperCase()}`;
            msg.className = win ? "msg-win" : "msg-lose";
            msg.style.display = 'block';
            document.getElementById('btn-next').style.display = 'block';
            document.getElementById('mini-input-zone').style.display = 'none';
            document.getElementById('mini-options').style.display = 'none';
        }

        function backToMenu() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('game-interface').style.display = 'none';
            document.getElementById('minigame-interface').style.display = 'none';
        }

        init();
    </script>
