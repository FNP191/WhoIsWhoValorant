<script>
        const apiUrl = 'https://valorant-api.com/v1/agents?isPlayableCharacter=true&language=es-ES';
        let agents = [], myAgent = null;
        let attempts = 0;

        async function initGame() {
            try {
                const res = await fetch(apiUrl);
                const data = await res.json();
                agents = data.data;
                
                populateRoleFilter();
                createFullBoard(); // Creamos las cartas una sola vez
                resetGame();
            } catch (e) {
                console.error("Error cargando API:", e);
            }
        }

        function populateRoleFilter() {
            const roles = [...new Set(agents.map(a => a.role.displayName))].sort();
            const sel = document.getElementById('roleFilter');
            roles.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r; opt.textContent = r;
                sel.appendChild(opt);
            });
        }

        // Esta función crea todas las cartas al inicio
        function createFullBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            agents.forEach(agent => {
                const card = document.createElement('div');
                card.className = 'agent-card';
                // Guardamos el rol en un atributo de datos para filtrar fácil
                card.dataset.role = agent.role.displayName; 
                card.dataset.name = agent.displayName;
                
                card.innerHTML = `
                    <img src="${agent.displayIcon}" alt="${agent.displayName}">
                    <h3>${agent.displayName}</h3>
                    <p>${agent.role.displayName}</p>
                `;
                
                card.onclick = () => handleCardClick(card, agent);
                board.appendChild(card);
            });
        }

        function applyFilter() {
            const selectedRole = document.getElementById('roleFilter').value;
            const cards = document.querySelectorAll('.agent-card');
            
            cards.forEach(card => {
                if (selectedRole === 'all' || card.dataset.role === selectedRole) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function resetGame() {
            attempts = 0;
            document.getElementById('victoryOverlay').classList.remove('show');
            document.getElementById('roleFilter').value = 'all';
            
            // Elegir agente secreto
            myAgent = agents[Math.floor(Math.random() * agents.length)];
            document.getElementById('my-agent-img').src = myAgent.displayIcon;
            document.getElementById('my-agent-name').textContent = myAgent.displayName;
            document.getElementById('my-agent-role').textContent = myAgent.role.displayName;
            
            // Resetear visual de las cartas
            const cards = document.querySelectorAll('.agent-card');
            cards.forEach(card => {
                card.classList.remove('discarded');
                card.style.display = 'block';
            });
            
            updateStats();
        }

        function handleCardClick(card, agent) {
            if (card.classList.contains('discarded')) {
                card.classList.remove('discarded');
                updateStats();
                return;
            }

            attempts++;

            if (agent.displayName === myAgent.displayName) {
                const overlay = document.getElementById('victoryOverlay');
                const box = document.getElementById('victoryBox');
                box.className = 'victory-box win';
                document.getElementById('victoryTitle').textContent = '¡Correcto!';
                document.getElementById('victoryMsg').textContent = `¡Encontraste a ${agent.displayName} en ${attempts} intento(s)!`;
                overlay.classList.add('show');
            } else {
                card.classList.add('discarded');
            }
            updateStats();
        }

        function updateStats() {
            document.getElementById('attemptCount').textContent = attempts;
            // Contamos cuántas cartas visibles tienen la clase discarded
            const discardedCount = document.querySelectorAll('.agent-card.discarded').length;
            document.getElementById('discardedCount').textContent = discardedCount;
        }

        initGame();
    </script>
