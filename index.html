<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Guess - Full Roster</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f1923;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Pantalla de Inicio --- */
        #main-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
            text-align: center;
            width: 100%;
        }

        .menu-title {
            font-size: 3rem;
            color: #ff4655;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 40px;
            text-shadow: 2px 2px 0px rgba(255, 70, 85, 0.2);
        }

        .mode-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-card {
            background: #1f2731;
            border: 2px solid #333;
            padding: 30px;
            border-radius: 15px;
            width: 280px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .mode-card:hover {
            border-color: #ff4655;
            transform: translateY(-10px);
            background: #262f3a;
        }

        .mode-card h2 { color: #ff4655; text-transform: uppercase; font-size: 1.2rem;}
        .mode-card p { font-size: 0.9rem; color: #aaa; line-height: 1.4; }

        /* --- Interfaz de Juego --- */
        #game-interface {
            display: none;
            width: 100%;
            max-width: 1100px;
        }

        .header-game {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
        }

        h1 { color: #ff4655; text-transform: uppercase; letter-spacing: 2px; text-align: center; }

        .top-bar {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .card-panel {
            background: #1f2731;
            border: 2px solid #333;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            min-width: 220px;
            height: fit-content;
        }

        /* Contenedor para el círculo del agente */
        .secret-agent-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ece8e1;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid #333;
        }

        .secret-agent-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .question-mark { font-size: 40px; color: #0f1923; font-weight: bold; display: block; }

        .questions-panel {
            background: #1f2731;
            border: 1px solid #ff4655;
            padding: 15px;
            border-radius: 10px;
            flex: 1;
            min-width: 300px;
        }

        .status-container {
            display: flex;
            justify-content: space-around;
            background: #0f1923;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .stat-box { text-align: center; flex: 1; }
        .stat-val { display: block; font-size: 20px; font-weight: bold; color: #ff4655; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: #888; }

        #game-message {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .msg-win { background: #4caf50; color: white; display: block !important; }
        .msg-lose { background: #ff4655; color: white; display: block !important; }

        .question-controls { display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 10px; }

        select {
            background: #0f1923;
            color: white;
            border: 1px solid #ff4655;
            padding: 8px;
            border-radius: 5px;
            flex: 1;
            cursor: pointer;
        }

        .history-container {
            margin-top: 15px;
            max-height: 120px;
            overflow-y: auto;
            background: #0f1923;
            padding: 8px;
            border-radius: 5px;
            font-size: 12px;
            border: 1px solid #333;
        }
        .history-item {
            padding: 4px 0;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
        }
        .hist-yes { color: #4caf50; font-weight: bold; }
        .hist-no { color: #ff4655; font-weight: bold; }

        .board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            width: 100%;
        }
        .agent-card {
            background: #ece8e1;
            color: #0f1923;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 3px solid transparent;
        }
        .agent-card:hover { border-color: #ff4655; }
        .agent-card img { width: 100%; border-radius: 4px; pointer-events: none; }
        .agent-card h3 { font-size: 13px; margin-top: 5px; text-transform: uppercase; pointer-events: none; }
        
        /* Modificado para permitir desmarcar sin bloquear clics */
        .discarded { opacity: 0.15 !important; filter: grayscale(100%); }

        .btn {
            background: transparent;
            border: 2px solid #ff4655;
            color: #ff4655;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
        .btn:hover:not(:disabled) { background: #ff4655; color: white; }
        .btn:disabled { border-color: #555; color: #555; cursor: not-allowed; }
        
        .selecting-mode .agent-card {
            border: 2px dashed #ff4655;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 class="menu-title">Valorant Guess</h1>
        <div class="mode-container">
            <div class="mode-card" onclick="startGame('classic')">
                <h2>Modo Clásico</h2>
                <p>Elige tu propio agente. Ahora puedes marcar y desmarcar agentes del tablero.</p>
                <button class="btn btn-jugar" style="margin-top: auto;">Cargando...</button>
            </div>
            <div class="mode-card" onclick="startGame('ask')">
                <h2>Modo Desafío</h2>
                <p>Adivina el agente oculto de la IA mediante preguntas de atributos.</p>
                <button class="btn btn-jugar" style="margin-top: auto;">Cargando...</button>
            </div>
        </div>
    </div>

    <div id="game-interface">
        <div class="header-game">
            <button class="btn" onclick="backToMenu()">← Menú Principal</button>
            <h1 id="mode-title">JUGANDO</h1>
            <div style="width: 160px;"></div>
        </div>

        <div class="top-bar">
            <div class="card-panel">
                <h2 id="title-secret">Tu Agente</h2>
                <div id="secret-info">
                    <div class="secret-agent-container">
                        <span id="q-mark" class="question-mark">?</span>
                        <img id="my-agent-img" class="secret-agent-img" src="" alt="">
                    </div>
                    <h3 id="my-agent-name">Selecciona uno</h3>
                </div>
                <div id="classic-controls" style="display: none; margin-top: 10px;">
                    <button class="btn" id="btn-pick" onclick="enableSelection()" style="width: 100%; font-size: 11px;">Elegir mi Agente</button>
                </div>
                <button class="btn" style="margin-top: 10px; width: 100%; font-size: 11px;" onclick="resetGame()">Reiniciar Tablero</button>
            </div>

            <div class="questions-panel" id="questions-panel">
                <div id="game-message"></div>

                <div class="status-container">
                    <div class="stat-box">
                        <span class="stat-label">Preguntas</span>
                        <span id="q-count" class="stat-val">0 / 10</span>
                    </div>
                    <div class="stat-box" style="border-left: 1px solid #333;">
                        <span class="stat-label">Fallos</span>
                        <span id="fail-count" class="stat-val">0 / 3</span>
                    </div>
                </div>
                
                <div id="controls-area" class="question-controls">
                    <div class="row">
                        <select id="question-category" onchange="updateOptions()">
                            <option value="role">¿Su Rol es...?</option>
                            <option value="gender">¿Su Género es...?</option>
                            <option value="year">¿Fue añadido en...?</option>
                            <option value="country">¿Es de...?</option>
                        </select>
                        <select id="question-value"></select>
                    </div>
                    <button class="btn" id="ask-btn" onclick="askQuestion()">Preguntar Atributo</button>
                </div>

                <div id="reset-area" style="display:none; margin-top:10px;">
                    <button class="btn" style="width: 100%; background: #ff4655; color: white;" onclick="resetGame()">Jugar Otra Vez</button>
                </div>

                <div class="history-container" id="history"></div>
            </div>
        </div>

        <div class="board" id="board"></div>
    </div>

    <script>
        const apiUrl = 'https://valorant-api.com/v1/agents?isPlayableCharacter=true&language=es-ES';
        let agents = [], myAgent = null;
        let currentGameMode = 'classic';
        let isSelectingAgent = false;
        let qCount = 0, failCount = 0, gameOver = false, isReady = false;

        const agentData = {
            "Jett": { g: "Femenino", y: "2020", c: "Corea del Sur" }, "Raze": { g: "Femenino", y: "2020", c: "Brasil" },
            "Breach": { g: "Masculino", y: "2020", c: "Suecia" }, "Omen": { g: "Robot", y: "2020", c: "Desconocido" },
            "Brimstone": { g: "Masculino", y: "2020", c: "Estados Unidos" }, "Phoenix": { g: "Masculino", y: "2020", c: "Reino Unido" },
            "Sage": { g: "Femenino", y: "2020", c: "China" }, "Sova": { g: "Masculino", y: "2020", c: "Rusia" },
            "Viper": { g: "Femenino", y: "2020", c: "Estados Unidos" }, "Cypher": { g: "Masculino", y: "2020", c: "Marruecos" },
            "Reyna": { g: "Femenino", y: "2020", c: "México" }, "Killjoy": { g: "Femenino", y: "2020", c: "Alemania" },
            "Skye": { g: "Femenino", y: "2020", c: "Australia" }, "Yoru": { g: "Masculino", y: "2021", c: "Japón" },
            "Astra": { g: "Femenino", y: "2021", c: "Ghana" }, "KAY/O": { g: "Robot", y: "2021", c: "Desconocido" },
            "Chamber": { g: "Masculino", y: "2021", c: "Francia" }, "Neon": { g: "Femenino", y: "2022", c: "Filipinas" },
            "Fade": { g: "Femenino", y: "2022", c: "Turquía" }, "Harbor": { g: "Masculino", y: "2022", c: "India" },
            "Gekko": { g: "Masculino", y: "2023", c: "Estados Unidos" }, "Deadlock": { g: "Femenino", y: "2023", c: "Noruega" },
            "Iso": { g: "Masculino", y: "2023", c: "China" }, "Clove": { g: "Femenino", y: "2024", c: "Escocia" },
            "Vyse": { g: "Robot", y: "2024", c: "Desconocido" }, "Veto": { g: "Masculino", y: "2025", c: "Senegal" },
            "Tejo": { g: "Masculino", y: "2025", c: "Colombia" },
            "Miks": { g: "Masculino", y: "2026", c: "Croacia" }
        };

        async function initGame() {
            try {
                const res = await fetch(apiUrl);
                const data = await res.json();
                agents = data.data.filter(a => agentData[a.displayName]);
                updateOptions();
                isReady = true;
                document.querySelectorAll('.btn-jugar').forEach(btn => btn.textContent = "Jugar");
            } catch (e) { console.error("Error al cargar agentes", e); }
        }

        function startGame(mode) {
            if (!isReady) return;
            currentGameMode = mode;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-interface').style.display = 'block';
            document.getElementById('mode-title').textContent = mode === 'classic' ? 'MODO CLÁSICO' : 'ADIVINA EL AGENTE';
            document.getElementById('questions-panel').style.display = mode === 'ask' ? 'block' : 'none';
            document.getElementById('classic-controls').style.display = mode === 'classic' ? 'block' : 'none';
            resetGame();
        }

        function backToMenu() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('game-interface').style.display = 'none';
            isSelectingAgent = false;
        }

        function enableSelection() {
            isSelectingAgent = true;
            document.getElementById('board').classList.add('selecting-mode');
            document.getElementById('btn-pick').textContent = "Haz clic en un agente...";
            document.getElementById('btn-pick').disabled = true;
        }

        function resetGame() {
            qCount = 0; failCount = 0; gameOver = false; isSelectingAgent = false;
            document.getElementById('board').classList.remove('selecting-mode');
            document.getElementById('btn-pick').textContent = "Elegir mi Agente";
            document.getElementById('btn-pick').disabled = false;

            const img = document.getElementById('my-agent-img');
            const qMark = document.getElementById('q-mark');

            if (currentGameMode === 'ask') {
                myAgent = agents[Math.floor(Math.random() * agents.length)];
                img.src = myAgent.displayIcon;
                img.style.display = 'block';
                qMark.style.display = 'none';
                document.getElementById('my-agent-name').textContent = myAgent.displayName;
            } else {
                myAgent = null;
                img.src = "";
                img.style.display = 'none';
                qMark.style.display = 'block';
                document.getElementById('my-agent-name').textContent = "Selecciona uno";
            }
            
            document.getElementById('q-count').textContent = "0 / 10";
            document.getElementById('fail-count').textContent = "0 / 3";
            document.getElementById('history').innerHTML = '';
            document.getElementById('ask-btn').disabled = false;
            document.getElementById('game-message').style.display = 'none';
            document.getElementById('reset-area').style.display = 'none';
            document.getElementById('controls-area').style.display = 'flex';
            
            updateSecretVisibility();
            renderBoard();
        }

        function updateSecretVisibility(reveal = false) {
            const secretInfo = document.getElementById('secret-info');
            const titleSecret = document.getElementById('title-secret');
            if (currentGameMode === 'ask' && !reveal) {
                secretInfo.style.opacity = '0';
                secretInfo.style.filter = 'blur(10px)';
                titleSecret.textContent = "Agente Oculto";
            } else {
                secretInfo.style.opacity = '1';
                secretInfo.style.filter = 'blur(0px)';
                titleSecret.textContent = "Tu Agente";
            }
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            agents.forEach(agent => {
                const card = document.createElement('div');
                card.className = 'agent-card';
                card.innerHTML = `<img src="${agent.displayIcon}"><h3>${agent.displayName}</h3>`;
                card.onclick = () => {
                    if (isSelectingAgent) {
                        selectMyAgent(agent);
                    } else {
                        if (gameOver) return;
                        if (currentGameMode === 'classic') {
                            card.classList.toggle('discarded');
                        } else {
                            checkGuess(agent, card);
                        }
                    }
                };
                board.appendChild(card);
            });
        }

        function selectMyAgent(agent) {
            myAgent = agent;
            isSelectingAgent = false;
            document.getElementById('board').classList.remove('selecting-mode');
            
            const img = document.getElementById('my-agent-img');
            const qMark = document.getElementById('q-mark');
            img.src = agent.displayIcon;
            img.style.display = 'block';
            qMark.style.display = 'none';

            document.getElementById('my-agent-name').textContent = agent.displayName;
            document.getElementById('btn-pick').textContent = "Cambiar Agente";
            document.getElementById('btn-pick').disabled = false;
        }

        function checkGuess(agent, card) {
            if (agent.displayName === myAgent.displayName) {
                gameOver = true;
                updateSecretVisibility(true);
                showMessage("¡HAS GANADO!", "msg-win");
                document.getElementById('controls-area').style.display = 'none';
                document.getElementById('reset-area').style.display = 'block';
            } else {
                failCount++;
                document.getElementById('fail-count').textContent = `${failCount} / 3`;
                card.classList.add('discarded');
                addToHistory(`¿Es ${agent.displayName}?`, false);
                if (failCount >= 3) {
                    gameOver = true;
                    updateSecretVisibility(true);
                    showMessage("DERROTA: Sin intentos", "msg-lose");
                    document.getElementById('controls-area').style.display = 'none';
                    document.getElementById('reset-area').style.display = 'block';
                }
            }
        }

        function askQuestion() {
            if (qCount >= 10 || gameOver) return;
            const catSelect = document.getElementById('question-category');
            const val = document.getElementById('question-value').value;
            const catText = catSelect.options[catSelect.selectedIndex].text.replace('...?', '');
            
            qCount++;
            document.getElementById('q-count').textContent = `${qCount} / 10`;
            const extra = agentData[myAgent.displayName];
            let success = false;
            
            if (catSelect.value === 'role') success = myAgent.role.displayName === val;
            else if (catSelect.value === 'gender') success = extra.g === val;
            else if (catSelect.value === 'year') success = extra.y === val;
            else if (catSelect.value === 'country') success = extra.c === val;

            addToHistory(`${catText} ${val}`, success);
            if (qCount >= 10) document.getElementById('ask-btn').disabled = true;
        }

        function showMessage(text, className) {
            const msgBox = document.getElementById('game-message');
            msgBox.textContent = text;
            msgBox.className = className;
            msgBox.style.display = 'block';
        }

        function addToHistory(text, success) {
            const hist = document.getElementById('history');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<span>${text}</span><span class="${success ? 'hist-yes' : 'hist-no'}">${success ? 'SÍ' : 'NO'}</span>`;
            hist.prepend(item);
        }

        function updateOptions() {
            const cat = document.getElementById('question-category').value;
            const valSelect = document.getElementById('question-value');
            valSelect.innerHTML = '';
            let options = [];
            if (cat === 'role') options = [...new Set(agents.map(a => a.role.displayName))];
            else if (cat === 'gender') options = ["Masculino", "Femenino", "Robot"];
            else if (cat === 'year') options = ["2020", "2021", "2022", "2023", "2024"];
            else if (cat === 'country') options = [...new Set(Object.values(agentData).map(d => d.c))].sort();
            
            options.forEach(opt => {
                const o = document.createElement('option');
                o.value = opt; o.textContent = opt;
                valSelect.appendChild(o);
            });
        }

        initGame();
    </script>
</body>
</html>
